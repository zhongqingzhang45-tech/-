<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Marketing Agent</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:#12121a;border-right:1px solid #2a2a3a}.logo{padding:24px 20px;font-size:18px;font-weight:700;color:#fff;border-bottom:1px solid #2a2a3a}.logo span{color:#6366f1}.nav-item{padding:14px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;color:#a0a0b0}.nav-item:hover{background:#1a1a2e;color:#fff}.nav-item.active{background:#1a1a2e;color:#6366f1;border-left:3px solid #6366f1}.main{margin-left:260px;padding:30px}h1{font-size:28px;margin-bottom:24px}h2{font-size:20px;margin:24px 0 16px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}.stat-card{background:#12121a;padding:24px;border-radius:12px;border:1px solid #2a2a3a}.stat-value{font-size:36px;font-weight:700;color:#6366f1;margin-bottom:8px}.stat-label{font-size:13px;color:#a0a0b0}.data-table{width:100%;background:#12121a;border-radius:12px;overflow:hidden;border:1px solid #2a2a3a}.data-table th,.data-table td{padding:14px 20px;text-align:left;border-bottom:1px solid #2a2a3a}.data-table th{background:#1a1a2e;font-size:13px;color:#a0a0b0}.data-table tr:hover{background:#1a1a2e}button{background:#6366f1;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px}button:hover{background:#4f51e4}input,select,textarea{background:#1a1a2e;color:#e0e0e0;border:1px solid #2a2a3a;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;margin-bottom:12px}.card{background:#12121a;padding:24px;border-radius:12px;border:1px solid #2a2a3a;margin-bottom:20px}.tag{display:inline-block;background:#1a1a2e;padding:6px 12px;border-radius:20px;font-size:12px;margin:4px;color:#a0a0b0;cursor:pointer;border:none}.tag-active{background:#6366f1;color:#fff}.agent-status{display:flex;align-items:center;gap:12px;padding:16px;background:#1a1a2e;border-radius:8px;margin-bottom:10px}.status-dot{width:10px;height:10px;border-radius:50%;background:#10b981}.status-running{background:#f59e0b;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}pre{white-space:pre-wrap;background:#1a1a2e;padding:20px;border-radius:8px;line-height:1.8;font-family:inherit}</style></head><body><div class="sidebar"><div class="logo">Marketing<span>Agent</span></div><div class="nav-item active" data-page="dashboard">📊 仪表盘</div><div class="nav-item" data-page="products">🔥 爆品中心</div><div class="nav-item" data-page="topics">📈 热点中心</div><div class="nav-item" data-page="content">✍️ 内容工厂</div><div class="nav-item" data-page="video">🎬 视频工厂</div><div class="nav-item" data-page="publish">🚀 发布中心</div><div class="nav-item" data-page="accounts">👥 账号中心</div><div class="nav-item" data-page="config">⚙️ 系统设置</div></div><div class="main"><div id="content"></div></div><script>const state={currentPage:"dashboard",selectedType:"种草文"};function $(id){return document.getElementById(id);}function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(m){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}document.querySelectorAll(".nav-item").forEach(function(el){el.onclick=function(){state.currentPage=el.dataset.page;document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});el.classList.add("active");loadPage();};});async function apiGet(u){var r=await fetch(u);return await r.json();}async function apiPost(u,d){var r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});return await r.json();}async function loadPage(){var c=$("content");if(state.currentPage==="dashboard"){var d=await apiGet("/api/stats");var html="<h1>📊 仪表盘</h1><div class=\"stats-grid\">"+"<div class=\"stat-card\"><div class=\"stat-value\">"+d.products+"</div><div class=\"stat-label\">商品总数</div></div>"+"<div class=\"stat-card\"><div class=\"stat-value\">"+d.topics+"</div><div class=\"stat-label\">热点话题</div></div>"+"<div class=\"stat-card\"><div class=\"stat-value\">"+d.total_sales+"</div><div class=\"stat-label\">总销量</div></div>"+"<div class=\"stat-card\"><div class=\"stat-value\">¥"+d.total_commission+"</div><div class=\"stat-label\">总佣金</div></div>"+"<div class=\"stat-card\"><div class=\"stat-value\">"+d.generated_content+"</div><div class=\"stat-label\">生成内容</div></div>"+"<div class=\"stat-card\"><div class=\"stat-value\">"+d.accounts+"</div><div class=\"stat-label\">账号数</div></div></div>"+"<h2>🤖 Agent 运行状态</h2>";d.tasks.forEach(function(t){html+="<div class=\"agent-status\"><div class=\"status-dot "+(t.status==="running"?"status-running":"")+"\"></div><div><div style=\"font-weight:600;\">"+t.name+"</div><div style=\"font-size:12px;color:#a0a0b0;\">状态: "+t.status+"</div></div></div>";});html+="<h2>🔥 热销商品 TOP 10</h2><div class=\"data-table\"><table style=\"width:100%\"><thead><tr><th>商品名</th><th>分类</th><th>价格</th><th>销量</th><th>佣金</th></tr></thead><tbody>";d.top_products.forEach(function(p){html+="<tr><td>"+esc(p.name)+"</td><td><span class=\"tag\" style=\"cursor:default;\">"+esc(p.category)+"</span></td><td>¥"+p.price+"</td><td>"+p.sales+"</td><td>¥"+p.commission+"</td></tr>";});html+="</tbody></table></div>";c.innerHTML=html;}else if(state.currentPage==="products"){var d=await apiGet("/api/products");var cats=[];d.items.forEach(function(p){if(cats.indexOf(p.category)<0)cats.push(p.category);});var html="<h1>🔥 爆品中心</h1><div class=\"card\"><select id=\"catFilter\"><option value=\"\">全部分类</option>";cats.forEach(function(ct){html+="<option>"+ct+"</option>";});html+="</select></div><div class=\"data-table\"><table style=\"width:100%\"><thead><tr><th>商品名</th><th>分类</th><th>价格</th><th>销量</th><th>佣金</th><th>热度</th><th>操作</th></tr></thead><tbody>";d.items.forEach(function(p){html+="<tr data-c=\""+p.category+"\"><td>"+esc(p.name)+"</td><td><span class=\"tag\" style=\"cursor:default;\">"+esc(p.category)+"</span></td><td>¥"+p.price+"</td><td>"+p.sales+"</td><td>¥"+p.commission+"</td><td>"+p.hot_score+"</td><td><button onclick=\"genFromProd("+p.id+")\">生成内容</button></td></tr>";});html+="</tbody></table></div>";c.innerHTML=html;setTimeout(function(){$("catFilter").onchange=function(e){document.querySelectorAll("[data-c]").forEach(function(r){r.style.display=(!e.target.value||r.dataset.c===e.target.value)?"":"none";});};},0);}else if(state.currentPage==="topics"){var d=await apiGet("/api/hot_topics");var html="<h1>📈 热点中心</h1>";d.items.forEach(function(t){html+="<div class=\"card\"><div style=\"font-size:18px;font-weight:600;margin-bottom:10px;\">"+esc(t.keyword)+"</div><span class=\"tag tag-active\" style=\"cursor:default;\">"+esc(t.platform)+"</span><span class=\"tag\" style=\"cursor:default;\">热度: "+t.heat+"</span><span class=\"tag\" style=\"cursor:default;\">"+esc(t.trend)+"</span></div>";});c.innerHTML=html;}else if(state.currentPage==="content"){var d=await apiGet("/api/products");var html="<h1>✍️ 内容工厂</h1><div class=\"card\"><h2 style=\"margin-top:0;\">选择商品</h2><select id=\"prodSel\">";d.items.forEach(function(p){html+="<option value=\""+p.id+"\">"+esc(p.name)+"</option>";});html+="</select></div><div class=\"card\"><h2 style=\"margin-top:0;\">内容类型</h2><button class=\"tag tag-active\" onclick=\"setCT(this,'种草文')\">种草文</button><button class=\"tag\" onclick=\"setCT(this,'测评文')\">测评文</button><button class=\"tag\" onclick=\"setCT(this,'短文案')\">短文案</button></div><div class=\"card\"><button onclick=\"doGen()\">✨ AI 生成内容</button><div id=\"genRes\"></div></div>";c.innerHTML=html;}else if(state.currentPage==="video"){var d=await apiGet("/api/products");var html="<h1>🎬 视频工厂</h1><div class=\"card\"><h2 style=\"margin-top:0;\">选择商品</h2><select id=\"vProd\">";d.items.forEach(function(p){html+="<option value=\""+p.id+"\">"+esc(p.name)+"</option>";});html+="</select></div><div class=\"card\"><h2 style=\"margin-top:0;\">视频模板</h2><select id=\"vTpl\"><option>口播带货</option><option>开箱测评</option><option>剧情植入</option><option>对比测评</option></select></div><div class=\"card\"><button onclick=\"doVid()\">🎬 生成视频</button><div id=\"vidRes\"></div></div>";c.innerHTML=html;}else if(state.currentPage==="publish"){c.innerHTML="<h1>🚀 发布中心</h1><div class=\"card\"><h2 style=\"margin-top:0;\">发布内容</h2><textarea id=\"pubTxt\" rows=\"5\" placeholder=\"输入要发布的内容...\"></textarea><button onclick=\"doPub()\">🚀 一键发布</button><div id=\"pubRes\"></div></div>";}else if(state.currentPage==="accounts"){var d=await apiGet("/api/accounts");var html="<h1>👥 账号中心</h1><div class=\"data-table\"><table style=\"width:100%\"><thead><tr><th>平台</th><th>账号名</th><th>粉丝</th><th>状态</th><th>最近发布</th></tr></thead><tbody>";d.items.forEach(function(a){html+="<tr><td>"+esc(a.platform)+"</td><td>"+esc(a.name)+"</td><td>"+a.fans+"</td><td><span class=\"tag tag-active\" style=\"cursor:default;\">"+esc(a.status)+"</span></td><td>"+esc(a.last_publish)+"</td></tr>";});html+="</tbody></table></div>";c.innerHTML=html;}else if(state.currentPage==="config"){var d=await apiGet("/api/config");var html="<h1>⚙️ 系统设置</h1><div class=\"card\"><h2 style=\"margin-top:0;\">模型配置</h2><label style=\"display:block;margin-bottom:6px;font-size:13px;color:#a0a0b0;\">模型提供商</label><select id=\"cfgModel\"><option>本地模型</option><option>DeepSeek</option><option>OpenAI</option><option>Anthropic Claude</option></select><label style=\"display:block;margin:12px 0 6px;font-size:13px;color:#a0a0b0;\">API Key</label><input id=\"cfgKey\" type=\"password\" value=\""+(d.model.api_key||"")+"\"/><label style=\"display:block;margin:12px 0 6px;font-size:13px;color:#a0a0b0;\">温度: <span id=\"tv\">"+d.model.temperature+"</span></label><input id=\"cfgTemp\" type=\"range\" min=\"0\" max=\"2\" step=\"0.1\" value=\""+d.model.temperature+"\" oninput=\"document.getElementById('tv').innerText=this.value\"/><button onclick=\"saveCfg()\">💾 保存配置</button></div>";c.innerHTML=html;}}function setCT(btn,t){document.querySelectorAll(".tag").forEach(function(x){x.classList.remove("tag-active");});btn.classList.add("tag-active");state.selectedType=t;}async function doGen(){var pid=$("prodSel").value;var res=await apiPost("/api/actions/generate_content",{product_id:pid,content_type:state.selectedType});$("genRes").innerHTML="<div class=\"card\"><h3 style=\"margin-top:0;\">"+esc(res.title)+"</h3><pre>"+esc(res.content)+"</pre><div style=\"margin-top:20px;\">"+(res.tags||[]).map(function(t){return"<span class=\"tag\" style=\"cursor:default;\">"+esc(t)+"</span>";}).join("")+"</div><div style=\"margin-top:20px;color:#10b981;font-weight:600;\">"+esc(res.cta||"")+"</div></div>";}async function doVid(){var pid=$("vProd").value;var tpl=$("vTpl").value;$("vidRes").innerHTML="<div style=\"padding:20px;color:#a0a0b0;\">生成中...</div>";var res=await apiPost("/api/actions/generate_video",{product_id:pid,template:tpl});$("vidRes").innerHTML="<div class=\"card\"><h3 style=\"margin-top:0;\">✅ 视频生成成功</h3><video controls style=\"max-width:100%;border-radius:8px;\"><source src=\""+res.video_url+"\" type=\"video/mp4\"></video><div style=\"margin-top:10px;color:#a0a0b0;\">时长: "+res.duration+"秒 | 模板: "+esc(res.template)+"</div></div>";}async function doPub(){var txt=$("pubTxt").value;if(!txt){alert("请输入内容");return;}var res=await apiPost("/api/actions/publish",{platform:"抖音",content:txt});$("pubRes").innerHTML="<div class=\"card\"><h3 style=\"margin-top:0;\">✅ 发布成功</h3><p>任务ID: "+res.task_id+"</p><p>平台: "+esc(res.platform)+"</p><p>状态: "+esc(res.status)+"</p></div>";}async function genFromProd(pid){state.currentPage="content";document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});document.querySelector('[data-page="content"]').classList.add("active");await loadPage();setTimeout(async function(){$("prodSel").value=pid;doGen();},100);}async function saveCfg(){var cfg={model:{provider:"local",name:$("cfgModel").value,api_key:$("cfgKey").value,temperature:parseFloat($("cfgTemp").value)}};await apiPost("/api/config",cfg);alert("配置已保存");}loadPage();</script></body></html>
