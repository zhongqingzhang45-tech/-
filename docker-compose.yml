services:
  lifeos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeos-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - lifeos-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lifeos-net:
    driver: bridge
