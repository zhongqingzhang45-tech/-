<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Live2D Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            overflow: hidden;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Live2D...</div>
    <div id="canvas-container"></div>

    <script src="/vendor/live2dv3/live2dcubismcore.min.js"></script>
    <script src="/vendor/live2dv3/pixi.min.js"></script>
    <script src="/vendor/live2dv3/live2dcubismframework.js"></script>
    <script src="/vendor/live2dv3/live2dcubismpixi.js"></script>

    <script>
        let app = null;
        let model = null;
        let loader = null;

        function onUpdate(delta) {
            let deltaTime = 0.016 * delta;

            if (!this.animator.isPlaying) {
                let m = this.motions.get("idle");
                if (m) {
                    this.animator.getLayer("base").play(m);
                }
            }
            this._animator.updateAndEvaluate(deltaTime);

            if (this.inDrag) {
                this.addParameterValueById("ParamAngleX", this.pointerX * 30);
                this.addParameterValueById("ParamAngleY", -this.pointerY * 30);
                this.addParameterValueById("ParamBodyAngleX", this.pointerX * 10);
                this.addParameterValueById("ParamBodyAngleY", -this.pointerY * 10);
                this.addParameterValueById("ParamEyeBallX", this.pointerX);
                this.addParameterValueById("ParamEyeBallY", -this.pointerY);
            }

            if (this._physicsRig) {
                this._physicsRig.updateAndEvaluate(deltaTime);
            }

            this._coreModel.update();

            let sort = false;
            for (let m = 0; m < this._meshes.length; ++m) {
                this._meshes[m].alpha = this._coreModel.drawables.opacities[m];
                this._meshes[m].visible = Live2DCubismCore.Utils.hasIsVisibleBit(this._coreModel.drawables.dynamicFlags[m]);
                if (Live2DCubismCore.Utils.hasVertexPositionsDidChangeBit(this._coreModel.drawables.dynamicFlags[m])) {
                    this._meshes[m].vertices = this._coreModel.drawables.vertexPositions[m];
                    this._meshes[m].dirtyVertex = true;
                }
                if (Live2DCubismCore.Utils.hasRenderOrderDidChangeBit(this._coreModel.drawables.dynamicFlags[m])) {
                    sort = true;
                }
            }

            if (sort) {
                this.children.sort((a, b) => {
                    let aIndex = this._meshes.indexOf(a);
                    let bIndex = this._meshes.indexOf(b);
                    let aRenderOrder = this._coreModel.drawables.renderOrders[aIndex];
                    let bRenderOrder = this._coreModel.drawables.renderOrders[bIndex];
                    return aRenderOrder - bRenderOrder;
                });
            }

            this._coreModel.drawables.resetDynamicFlags();
        }

        function loadModel(basePath, modelName) {
            const container = document.getElementById("canvas-container");
            const width = window.innerWidth;
            const height = window.innerHeight;

            app = new PIXI.Application(width, height, {
                transparent: true,
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true,
            });
            container.appendChild(app.view);

            const modelDir = modelName + "/";
            const modelFile = modelName + ".model3.json";
            let textures = [];
            let textureCount = 0;
            let motionNames = [];

            loader = new PIXI.loaders.Loader(basePath);

            loader.add("model_json", modelDir + modelFile, {
                xhrType: PIXI.loaders.Resource.XHR_RESPONSE_TYPE.JSON
            });

            loader.load((loader1, resources1) => {
                console.log("Step 1 loaded:", resources1);
                const model3Obj = resources1.model_json.data;
                console.log("Model3 JSON:", model3Obj);

                if (model3Obj.FileReferences && model3Obj.FileReferences.Moc) {
                    loader.add("moc", modelDir + model3Obj.FileReferences.Moc, {
                        xhrType: PIXI.loaders.Resource.XHR_RESPONSE_TYPE.BUFFER
                    });
                }

                if (model3Obj.FileReferences && model3Obj.FileReferences.Textures) {
                    model3Obj.FileReferences.Textures.forEach((tex, i) => {
                        loader.add("texture" + i, modelDir + tex);
                        textureCount++;
                    });
                }

                if (model3Obj.FileReferences && model3Obj.FileReferences.Physics) {
                    loader.add("physics", modelDir + model3Obj.FileReferences.Physics, {
                        xhrType: PIXI.loaders.Resource.XHR_RESPONSE_TYPE.JSON
                    });
                }

                if (model3Obj.FileReferences && model3Obj.FileReferences.Motions) {
                    for (let group in model3Obj.FileReferences.Motions) {
                        model3Obj.FileReferences.Motions[group].forEach(mot => {
                            let motionName = mot.File.split("/").pop().split(".").shift();
                            let resourceKey = "motion_" + motionName;
                            if (motionNames.indexOf(resourceKey) === -1) {
                                loader.add(resourceKey, modelDir + mot.File, {
                                    xhrType: PIXI.loaders.Resource.XHR_RESPONSE_TYPE.JSON
                                });
                                motionNames.push(resourceKey);
                            }
                        });
                    }
                }

                let groups = null;
                if (model3Obj.Groups) {
                    groups = LIVE2DCUBISMFRAMEWORK.Groups.fromModel3Json(model3Obj);
                }

                loader.load((l, r) => {
                    console.log("Step 2 loaded:", r);
                    try {
                        let moc = null;
                        if (r.moc && r.moc.data) {
                            moc = Live2DCubismCore.Moc.fromArrayBuffer(r.moc.data);
                        }
                        if (!moc) {
                            throw new Error("Failed to load moc file");
                        }

                        for (let i = 0; i < textureCount; i++) {
                            if (r["texture" + i] && r["texture" + i].texture) {
                                textures[i] = r["texture" + i].texture;
                            }
                        }

                        const coreModel = Live2DCubismCore.Model.fromMoc(moc);
                        if (coreModel == null) {
                            throw new Error("Failed to create core model from moc");
                        }

                        const animatorBuilder = new LIVE2DCUBISMFRAMEWORK.AnimatorBuilder();
                        const animator = animatorBuilder
                            .setTarget(coreModel)
                            .setTimeScale(1)
                            .build();

                        let physicsRig = null;
                        if (r.physics && r.physics.data) {
                            const physicsBuilder = new LIVE2DCUBISMFRAMEWORK.PhysicsRigBuilder();
                            physicsBuilder.setPhysics3Json(r.physics.data);
                            physicsRig = physicsBuilder
                                .setTarget(coreModel)
                                .setTimeScale(1)
                                .build();
                        }

                        const motions = new Map();
                        motionNames.forEach(key => {
                            const res = r[key];
                            if (res && res.data) {
                                const motionName = key.replace("motion_", "");
                                const anim = LIVE2DCUBISMFRAMEWORK.Animation.fromMotion3Json(res.data);
                                motions.set(motionName, anim);
                            }
                        });

                        let userData = null;
                        model = LIVE2DCUBISMPIXI.Model._create(
                            coreModel,
                            textures,
                            animator,
                            physicsRig,
                            userData,
                            groups
                        );

                        model.motions = motions;
                        model.update = onUpdate;
                        model.inDrag = false;
                        model.pointerX = 0;
                        model.pointerY = 0;

                        model.animator.addLayer("base", LIVE2DCUBISMFRAMEWORK.BuiltinAnimationBlenders.OVERRIDE, 1);

                        app.stage.addChild(model);
                        app.stage.addChild(model.masks);

                        const modelScale = (width * 0.5 * 0.06);
                        model.position.x = width * 0.5;
                        model.position.y = height * 0.5;
                        model.scale.x = modelScale;
                        model.scale.y = modelScale;

                        if (model.height <= 200) {
                            const smallScale = (width * 0.5 * 0.6);
                            model.scale.x = smallScale;
                            model.scale.y = smallScale;
                        }

                        model.masks.resize(app.view.width, app.view.height);

                        app.ticker.add(delta => {
                            if (!model) return;
                            model.update(delta);
                            model.masks.update(app.renderer);
                        });

                        document.getElementById("loading").style.display = "none";
                        console.log("Model loaded successfully!");
                    } catch (e) {
                        console.error("Error loading model:", e);
                        document.getElementById("loading").textContent = "Error: " + e.message;
                    }
                });
            });
        }

        window.onload = function() {
            loadModel("/live2d-models/", "HaruGreeter");
        };

        window.onresize = function() {
            if (!app || !model) return;
            const width = window.innerWidth;
            const height = window.innerHeight;
            app.renderer.resize(width, height);
            model.position = new PIXI.Point(width * 0.5, height * 0.5);
            model.scale = new PIXI.Point(model.position.x * 0.06, model.position.x * 0.06);
            if (model.height <= 200) {
                model.scale = new PIXI.Point(model.position.x * 0.6, model.position.x * 0.6);
            }
            model.masks.resize(app.view.width, app.view.height);
        };
    </script>
</body>
</html>
