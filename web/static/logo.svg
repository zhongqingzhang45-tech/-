<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主渐变：深空蓝 -->
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- 增长绿渐变 -->
    <linearGradient id="gGreen" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <!-- M 字母立体渐变 -->
    <linearGradient id="gM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <!-- 辉光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 雷达扫描渐变 -->
    <linearGradient id="scanGrad" x1="50%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 外圈：雷达扫描圆环 -->
  <g transform="translate(512 512)">
    <!-- 三层半透明圆环 -->
    <circle r="420" fill="none" stroke="#3B82F6" stroke-opacity="0.12" stroke-width="2"/>
    <circle r="360" fill="none" stroke="#3B82F6" stroke-opacity="0.18" stroke-width="2"/>
    <circle r="300" fill="none" stroke="#3B82F6" stroke-opacity="0.25" stroke-width="2"/>
    <circle r="240" fill="none" stroke="#3B82F6" stroke-opacity="0.35" stroke-width="3"/>

    <!-- 雷达扫描扇形区域（右上 270°） -->
    <path d="M 0 0 L 420 0 A 420 420 0 0 0 297 -297 Z"
          fill="url(#scanGrad)" opacity="0.35"/>

    <!-- 四个方位小点 -->
    <circle cx="0" cy="-380" r="5" fill="#3B82F6"/>
    <circle cx="380" cy="0" r="5" fill="#3B82F6"/>
    <circle cx="0" cy="380" r="5" fill="#3B82F6"/>
    <circle cx="-380" cy="0" r="5" fill="#3B82F6"/>
  </g>

  <!-- 中心主体：字母 M -->
  <g transform="translate(512 512)" filter="url(#glow)">
    <!-- M 字母主体：粗线条、锐利棱角 -->
    <path d="M -180 140
             L -180 -160
             L -100 -160
             L 0 -40
             L 100 -160
             L 180 -160
             L 180 140
             L 120 140
             L 120 -50
             L 60 20
             L -60 20
             L -120 -50
             L -120 140
             Z"
          fill="url(#gBlue)" stroke="#60A5FA" stroke-width="3" stroke-linejoin="miter"/>

    <!-- M 内部高光线条（科技感） -->
    <path d="M -160 -140 L -100 -140 L 0 -30 L 100 -140 L 160 -140"
          fill="none" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M -160 120 L -120 120 L -120 -30"
          fill="none" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 160 120 L 120 120 L 120 -30"
          fill="none" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <!-- M 顶部中央的 V 形高光 -->
    <path d="M -95 -145 L 0 -45 L 95 -145"
          fill="none" stroke="#BFDBFE" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- 右上角：增长箭头（绿色，向上） -->
  <g transform="translate(512 512)">
    <!-- 箭头圆形背景（右上位置） -->
    <circle cx="240" cy="-200" r="85" fill="#0F172A" stroke="#10B981" stroke-width="4"/>
    <circle cx="240" cy="-200" r="65" fill="url(#gGreen)" opacity="0.15"/>

    <!-- 向上箭头 -->
    <path d="M 240 -260
             L 240 -150
             M 240 -260
             L 200 -210
             M 240 -260
             L 280 -210"
          fill="none" stroke="#10B981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
          filter="url(#softGlow)"/>

    <!-- 底部增长趋势线 -->
    <path d="M 200 -140 L 220 -155 L 245 -165 L 270 -180 L 290 -195"
          fill="none" stroke="#34D399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 小圆圈点缀 -->
    <circle cx="240" cy="-200" r="5" fill="#34D399"/>
  </g>

  <!-- 外圆环 -->
  <g transform="translate(512 512)" fill="none">
    <circle r="460" stroke="#3B82F6" stroke-opacity="0.15" stroke-width="4"/>
    <circle r="460" stroke="#3B82F6" stroke-opacity="0.6" stroke-width="2"
            stroke-dasharray="60 300" transform="rotate(-20)"/>
  </g>
</svg>
